<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Med-AgentLab graphical abstract</title>
  <desc id="desc">A left-to-right workflow showing clinical files, privacy preprocessing, model routing, AI agents, PubMed validation, reports and human expert review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="66" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#0f172a">Med-AgentLab</text>
  <text x="640" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Hybrid human + AI qualitative analysis workflow for clinical interview text</text>

  <g font-family="Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <rect x="55" y="210" width="175" height="160" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="142" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Input Files</text>
    <text x="142" y="288" text-anchor="middle" font-size="15" fill="#475569">XLSX / TXT / PDF</text>
    <text x="142" y="322" text-anchor="middle" font-size="15" fill="#475569">Clinical interview</text>
    <text x="142" y="346" text-anchor="middle" font-size="15" fill="#475569">text data</text>

    <rect x="275" y="210" width="185" height="160" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="367" y="246" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">Agent A</text>
    <text x="367" y="282" text-anchor="middle" font-size="15" fill="#7c2d12">Ollama privacy</text>
    <text x="367" y="308" text-anchor="middle" font-size="15" fill="#7c2d12">preprocessing</text>
    <text x="367" y="342" text-anchor="middle" font-size="14" fill="#9a3412">Regex fallback</text>

    <rect x="505" y="210" width="190" height="160" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="600" y="246" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">Model Router</text>
    <text x="600" y="282" text-anchor="middle" font-size="15" fill="#164e63">Quota-aware</text>
    <text x="600" y="308" text-anchor="middle" font-size="15" fill="#164e63">API pool</text>
    <text x="600" y="342" text-anchor="middle" font-size="14" fill="#155e75">Fallback tracking</text>

    <rect x="740" y="180" width="205" height="220" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="842" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">Analysis Agents</text>
    <text x="842" y="258" text-anchor="middle" font-size="15" fill="#166534">Agent B: themes</text>
    <text x="842" y="286" text-anchor="middle" font-size="15" fill="#166534">Agent C: PubMed</text>
    <text x="842" y="314" text-anchor="middle" font-size="15" fill="#166534">Agent D: report</text>
    <text x="842" y="354" text-anchor="middle" font-size="14" fill="#15803d">Structured analysis</text>

    <rect x="990" y="210" width="205" height="160" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <text x="1092" y="246" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">Outputs</text>
    <text x="1092" y="282" text-anchor="middle" font-size="15" fill="#7f1d1d">XLSX results</text>
    <text x="1092" y="308" text-anchor="middle" font-size="15" fill="#7f1d1d">Markdown report</text>
    <text x="1092" y="334" text-anchor="middle" font-size="15" fill="#7f1d1d">DOCX report</text>
  </g>

  <g stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M230 290 H270"/>
    <path d="M460 290 H500"/>
    <path d="M695 290 H735"/>
    <path d="M945 290 H985"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="300" y="500" width="680" height="82" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="535" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Human Expert Review</text>
    <text x="640" y="564" text-anchor="middle" font-size="15" fill="#475569">Researcher and supervisor inspect themes, privacy results, evidence and final interpretation.</text>
    <path d="M1092 372 C1092 455 900 500 820 500" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  </g>
</svg>
